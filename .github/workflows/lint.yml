name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Install nox
        run: |
          python -m pip install --upgrade pip
          python -m pip install nox

      - name: Prepare noxfile
        run: cp noxfile-template.py noxfile.py

      - name: Make script executable
        run: chmod +x .github/scripts/lint-changed.sh

      - name: Run lint script for changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          # Use default string values if the GitHub Context variables are null/empty
          .github/scripts/lint-changed.sh \
            "${EVENT_NAME:-local}" \
            "${BASE_REF:-main}" \
            "${BEFORE_SHA:-}"
